services:
  - type: web
    name: kokborok-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
    plan: starter  # Change to 'free' if you want, but model needs ~512MB+ RAM
